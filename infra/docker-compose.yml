services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: commonground-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: commonground
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: commonground-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: commonground-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: commonground-api
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/commonground
      REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /app/storage
      SECRET_KEY: dev-secret
      DEFAULT_TOP_K: 6
    volumes:
      - api_storage:/app/storage
    ports:
      - "8000:8000"

  worker:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: commonground-worker
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/commonground
      REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /app/storage
      SECRET_KEY: dev-secret
    volumes:
      - api_storage:/app/storage
    command: ["dramatiq", "app.worker.tasks", "--processes", "1", "--threads", "4"]

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: commonground-web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_DEV_BANNER: "true"
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data:
  api_storage:
